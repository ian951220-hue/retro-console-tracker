<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDSL 復古掌機市場追蹤儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .summary { text-align: center; font-size: 1.2em; margin-bottom: 20px; color: #555; background: #e3f2fd; padding: 10px; border-radius: 4px; }
        /* 設定圖表的高度與寬度比例 */
        .chart-container { position: relative; height: 50vh; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>NDSL 二手市場行情追蹤儀表板</h1>
    
    <div class="summary" id="summary-text">資料載入中...</div>
    
    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>
</div>

<script>
    // 讀取 JSON 檔案 (強制更新快取)
    fetch('retro_consoles.json?t=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
            // 1. 更新畫面上方的總筆數文字
            document.getElementById('summary-text').innerHTML = `成功載入！目前共有 <strong>${data.length}</strong> 筆有效報價資料。`;
            
            // 2. 準備給圖表吃的資料格式
            const labels = data.map((item, index) => `報價 ${index + 1}`); // X軸：報價 1, 報價 2...
            const prices = data.map(item => item.price); // Y軸：純數字價格
            const fullTitles = data.map(item => item.title); // 用來在滑鼠移過去時顯示完整標題

            // 3. 開始繪製 Chart.js 圖表
            const ctx = document.getElementById('priceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line', // 設定圖表類型為折線圖
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'NDSL 價格 (NT$)',
                        data: prices,
                        borderColor: '#4A90E2', // 折線的顏色 (科技藍)
                        backgroundColor: 'rgba(74, 144, 226, 0.2)', // 折線下方的填滿顏色
                        borderWidth: 2,
                        pointRadius: 5, // 數據點的大小
                        pointHoverRadius: 8, // 滑鼠移上去時數據點放大的大小
                        tension: 0.3 // 讓線條呈現微彎的平滑曲線
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                // 客製化滑鼠移上去的提示框，讓它顯示 PTT 的完整標題
                                title: function(context) {
                                    return fullTitles[context[0].dataIndex];
                                },
                                label: function(context) {
                                    return `價格: $${context.raw}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '價格 (新台幣/元)'
                            }
                        }
                    }
                }
            });
        })
        .catch(error => {
            console.error('讀取資料失敗:', error);
            document.getElementById('summary-text').innerHTML = '<span style="color:red;">讀取資料失敗，請確認 JSON 檔案是否存在。</span>';
        });
</script>

</body>
</html>
